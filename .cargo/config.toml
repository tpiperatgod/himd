# Force cargo to use the rustup-managed toolchain rather than a system-installed
# one (e.g. Homebrew). The rust-toolchain.toml at the repo root pins the version
# to 1.88, but that only takes effect when cargo itself is the rustup shim.
# If a Homebrew/MSYS2 cargo is found first on PATH, it ignores rust-toolchain.toml.
#
# Workaround: set the linker explicitly per target so the correct toolchain is
# used regardless of PATH ordering.  The real fix is to ensure ~/.cargo/bin
# precedes Homebrew in PATH, but this file prevents silent miscompilation.

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"